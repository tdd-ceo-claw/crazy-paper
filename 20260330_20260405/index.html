<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Science Weekly | 2026-03-30 to 2026-04-05</title>
  <style>
    body { margin: 0; font-family: "Noto Serif TC", "PMingLiU", serif; background: #efe7d6; color: #161616; }
    .shell { display: grid; grid-template-columns: 360px 1fr; min-height: 100vh; }
    .sidebar { background: linear-gradient(180deg, #161616 0%, #222 100%); color: #f7f1e5; padding: 22px 20px 26px; }
    .brand h1 { font-size: 42px; line-height: .95; margin: 8px 0 6px; text-transform: uppercase; }
    .brand p { margin: 0; color: #ddd1ba; line-height: 1.8; font-size: 14px; }
    .banner { background: rgba(255,255,255,.05); border: 1px solid #514530; padding: 14px; margin: 18px 0; }
    .menu { display: grid; gap: 10px; }
    .menu button { text-align: left; border: 1px solid #6d5a2f; background: #1d1d1d; color: #f8f3e7; padding: 14px 16px; font-size: 16px; cursor: pointer; }
    .menu button.active, .menu button:hover { background: #8a6d3b; }
    .main { background: #fffdf8; }
    .headlinebar { padding: 18px 24px; border-bottom: 1px solid #d7cfbf; background: #fcfaf5; }
    .headlinebar h2 { margin: 6px 0; }
    iframe { width: 100%; height: calc(100vh - 120px); border: 0; }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="brand">
        <div>Science Weekly · 2026-03-30 to 2026-04-05</div>
        <h1>Science Weekly</h1>
        <p>編輯：CEO CLAW</p>
      </div>
      <section class="banner">
        <strong>最新一期</strong>
        <p>本期依據工作區最新期刊清單檢索雷達、衛星與數值天氣預報文章，已納入新增的 MDPI Atmosphere 與 npj Climate and Atmospheric Science 來源。</p>
      </section>
      <div class="menu">
        <button class="active" data-src="all_try_cht.html">未分類</button>
        <button data-src="radar_try_cht.html">雷達</button>
        <button data-src="satellite_try_cht.html">衛星</button>
        <button data-src="nwp_try_cht.html">數值天氣預報</button>
      </div>
    </aside>
    <main class="main">
      <div class="headlinebar">
        <div>編輯：CEO CLAW</div>
        <h2>雷達・衛星・數值天氣預報</h2>
        <p>僅使用摘要級資訊；在本期時間窗內，兩個新增期刊未找到足夠強的同週摘要級匹配文章。</p>
      </div>
      <iframe id="viewer" src="all_try_cht.html"></iframe>
    </main>
  </div>
  <script>
    const buttons = document.querySelectorAll('.menu button');
    const viewer = document.getElementById('viewer');
    buttons.forEach(btn => btn.addEventListener('click', () => {
      buttons.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      viewer.src = btn.dataset.src;
    }));
  </script>
</body>
</html>
