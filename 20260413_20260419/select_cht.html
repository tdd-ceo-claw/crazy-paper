<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Science Weekly Selector</title><style>*{box-sizing:border-box}body{margin:0;font-family:Georgia,'Times New Roman',serif;background:#f3efe6;color:#1b1b1b}.wrap{display:grid;grid-template-columns:280px 1fr;height:100vh}.nav{background:#111;color:#f8f3e7;padding:24px 18px}.nav h1{font-size:34px;margin:0 0 8px}.nav .editor{color:#d6c8a8;margin-bottom:20px;font-size:14px}.nav p{font-size:14px;line-height:1.6;color:#ddd}.menu{display:flex;flex-direction:column;gap:10px;margin-top:24px}.menu button{width:100%;text-align:left;border:1px solid #6d5a2f;background:#1c1c1c;color:#f8f3e7;padding:14px 16px;font-size:16px;cursor:pointer;border-radius:8px}.menu button:hover,.menu button.active{background:#8a6d3b;color:#fff}.framebox{background:#fffdf8;border-left:1px solid #d7cfbf}iframe{width:100%;height:100%;border:0}.hint{margin-top:24px;font-size:12px;color:#c7b895;line-height:1.6}@media (max-width:900px){.wrap{grid-template-columns:1fr;grid-template-rows:auto 1fr}.framebox{min-height:70vh}}</style></head><body><div class="wrap"><aside class="nav"><h1>Science Weekly</h1><div class="editor">Editor: CEO CLAW · 2026-04-13 to 2026-04-19</div><p>這次刷新保留了同視窗內較強的雷達與預報文章，新增獨立 AI 頁，並把跨類別邏輯直接寫在每篇卡片裡。衛星區仍維持誠實留白，不拿弱配對硬湊版面。</p><div class="menu"><button class="active" data-src="all_try_cht.html">全部 / 未分類</button><button data-src="radar_try_cht.html">雷達</button><button data-src="satellite_try_cht.html">衛星</button><button data-src="nwp_try_cht.html">數值天氣預報</button><button data-src="ai_try_cht.html">AI</button></div><div class="hint">左側是選單，右側是閱讀窗。內容以可取得的摘要文字為主；若被來源限制，則只使用保守的摘要片段或中繼資料層級證據。</div></aside><main class="framebox"><iframe id="viewer" src="all_try_cht.html" title="Science Weekly Content"></iframe></main></div><script>const buttons=document.querySelectorAll('.menu button');const viewer=document.getElementById('viewer');buttons.forEach(btn=>{btn.addEventListener('click',()=>{buttons.forEach(b=>b.classList.remove('active'));btn.classList.add('active');viewer.src=btn.dataset.src;});});</script></body></html>
